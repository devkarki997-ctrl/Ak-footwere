<!DOCTYPE html>
<html>
<head>
    <title>AK Footwear | Login</title>
</head>
<body style="background:#0f0f0f; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <form method="POST" style="background:#1a1a1a; padding:40px; border-radius:15px; border:1px solid #333; width: 300px; text-align: center;">
        <h2 style="color: #3498db;">AK Footwear</h2>
        <p style="color: #888; font-size: 0.9em;">Please login to manage stock</p>
        <input type="text" name="username" placeholder="Username" required style="display:block; width:100%; margin-bottom:15px; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:5px; box-sizing: border-box;">
        <input type="password" name="password" placeholder="Password" required style="display:block; width:100%; margin-bottom:20px; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:5px; box-sizing: border-box;">
        <button type="submit" style="width:100%; padding:12px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; font-weight: bold;">Enter Shop</button>
    </form>
</body>
</html>
